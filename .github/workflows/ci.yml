name: CI

on:
  push:
    branches: [develop, next]
  pull_request:
    branches: [develop, next]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Run security audit
        # Remaining vulns tracked in #74 (gulp-imagemin chain) — informational only.
        run: npm audit || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Run coverage (src/ must be 100%)
        run: npm run test:coverage

  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install scaffolder dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Scaffold web project
        run: |
          node --input-type=module <<'EOF'
          import { scaffold } from './src/scaffold.js';
          await scaffold({
            projectName: 'smoke-test',
            description: 'CI integration smoke test',
            authorName: 'CI',
            authorEmail: 'ci@example.com',
            projectType: 'web',
            cwd: '/tmp',
          });
          EOF

      - name: Install generated project dependencies
        run: npm install --legacy-peer-deps
        working-directory: /tmp/smoke-test

      - name: Build generated project
        run: npx gulp build
        working-directory: /tmp/smoke-test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Dependabot PRs targeting main also trigger this via pull_request.

jobs:
  # audit, typecheck, and test all run in parallel — none depend on each other.

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run security audit (fail on critical)
        run: npm audit --audit-level=critical

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Type check (JSDoc via tsc)
        run: npx tsc --project jsconfig.json --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '22']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Run coverage (src/ must be 100%)
        run: npm run test:coverage

  integration:
    name: Integration — ${{ matrix.project-type }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        project-type: [web, email, wordpress]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install scaffolder dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Scaffold ${{ matrix.project-type }} project
        run: |
          node --input-type=module <<'EOF'
          import { scaffold } from './src/scaffold.js';
          await scaffold({
            projectName: 'smoke-test',
            description: 'CI integration smoke test',
            authorName: 'CI',
            authorEmail: 'ci@example.com',
            projectType: '${{ matrix.project-type }}',
            cwd: '/tmp',
          });
          EOF

      - name: Install generated project dependencies
        run: npm install --legacy-peer-deps
        working-directory: /tmp/smoke-test

      - name: Build generated project
        run: npx gulp build
        working-directory: /tmp/smoke-test


name: Feature Request
description: Suggest an improvement or new capability
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before requesting a feature, check `TODO.md` — it may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need or friction point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related issues, examples from similar tools, or anything else relevant.
    validations:
      required: false
